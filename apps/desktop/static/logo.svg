<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="er" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="20%" stop-color="#f97316" />
      <stop offset="40%" stop-color="#eab308" />
      <stop offset="60%" stop-color="#22c55e" />
      <stop offset="80%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <clipPath id="bounds">
      <rect width="512" height="512" rx="96" />
    </clipPath>
    <clipPath id="floppyClip">
      <rect x="136" y="120" width="240" height="272" rx="20" />
    </clipPath>
  </defs>
  <g clip-path="url(#bounds)">
    <!-- White beam -->
    <line x1="36" y1="256" x2="136" y2="256" stroke="#e0e0e0" stroke-width="10"
      stroke-linecap="round" />
    <!-- Rainbow beams -->
    <line x1="376" y1="256" x2="476" y2="108" stroke="#ef4444" stroke-width="10"
      stroke-linecap="round" opacity="0.9" />
    <line x1="376" y1="256" x2="480" y2="182" stroke="#f97316" stroke-width="10"
      stroke-linecap="round" opacity="0.9" />
    <line x1="376" y1="256" x2="480" y2="256" stroke="#eab308" stroke-width="10"
      stroke-linecap="round" opacity="0.9" />
    <line x1="376" y1="256" x2="480" y2="330" stroke="#22c55e" stroke-width="10"
      stroke-linecap="round" opacity="0.9" />
    <line x1="376" y1="256" x2="476" y2="404" stroke="#8b5cf6" stroke-width="10"
      stroke-linecap="round" opacity="0.9" />
  </g>
  <!-- Dark floppy body -->
  <rect x="136" y="120" width="240" height="272" rx="20" fill="#222" />
  <!-- Chamfered corner and rainbow edge clipped to floppy -->
  <g clip-path="url(#floppyClip)">
    <polygon points="136,120 180,120 136,164" fill="#2d2d2d" />
    <rect x="368" y="120" width="5" height="272" fill="url(#er)" opacity="0.8" />
  </g>
  <!-- Metal slider -->
  <rect x="196" y="120" width="120" height="72" rx="6" fill="#4a4a4a" />
  <rect x="232" y="128" width="48" height="56" rx="4" fill="#222" />
  <!-- Label area -->
  <rect x="172" y="252" width="168" height="100" rx="8" fill="#2d2d2d" />
  <!-- Label lines -->
  <line x1="192" y1="284" x2="320" y2="284" stroke="#4a4a4a" stroke-width="3" stroke-linecap="round" />
  <line x1="192" y1="308" x2="290" y2="308" stroke="#4a4a4a" stroke-width="3" stroke-linecap="round" />
  <!-- Outline -->
  <rect x="136" y="120" width="240" height="272" rx="20" fill="none" stroke="#4a4a4a"
    stroke-width="2.5" />
</svg>